modules:
  automation:actionProvider:
    - key: fetch-external-data-automation-action-automation-action-provider-ui-kit
      actions:
        - automation-action-ui-kit
  action:
    - key: automation-action-ui-kit
      name: Automation action
      function: add-comment-to-issue
      description: adds comment on an issue.
      config:
        resource: main-resource
        render: native
      inputs:
        issueKey:
          title: Issue Id
          type: string
          description: The issue id for the Jira issue id where a comments needs to be added
          required: true
        comment:
          title: Comment
          type: string
          description: The comment that needs to be added to the issue
          required: true
      actionVerb: CREATE
      resolver:
        function: automation-resolver
  function:
    - key: add-comment-to-issue
      handler: index.addComment
    - key: automation-resolver
      handler: index.handler
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/394ea141-053d-4a9e-b584-0af14258e470
resources:
  - key: main-resource
    path: src/frontend/index.jsx
permissions:
  scopes:
    - write:jira-work
    - read:jira-work
