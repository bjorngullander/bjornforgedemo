modules:
  automation:actionProvider:
    - key: fetch-external-data-automation-action-automation-action-provider-ui-kit
      actions:
        - fetch-external-data-action
  action:
    - key: fetch-external-data-action
      name: Fetch External Data
      function: fetch-ext-data-func
      description: Fetches data from a configured external REST API using two input
        parameters and returns the JSON response for use in subsequent
        automation actions.
      config:
        resource: main-resource
        render: native
      inputs:
        parameter1:
          title: Parameter 1
          type: string
          description: First parameter to substitute into the configured REST URL
          required: true
        parameter2:
          title: Parameter 2
          type: string
          description: Second parameter to substitute into the configured REST URL
          required: false
      actionVerb: CREATE
      outputs:
        responseJson:
          description: Raw JSON response from the external API as a string
          type: string
          nullable: false
        statusCode:
          description: HTTP status code from the external API
          type: number
          nullable: false
        requestUrl:
          description: Final URL used for the external API request
          type: string
          nullable: false
      outputContext:
        entityName: extdata
        outputType: OBJECT
        outputDomain: external
      resolver:
        function: automation-resolver
  jira:adminPage:
    - key: fetch-external-data-admin-page
      title: Fetch External Data Settings
      resource: admin-resource
      render: native
      resolver:
        function: automation-resolver
  function:
    - key: fetch-ext-data-func
      handler: index.fetchExternalData
    - key: automation-resolver
      handler: index.handler
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/394ea141-053d-4a9e-b584-0af14258e470
resources:
  - key: main-resource
    path: src/frontend/index.jsx
  - key: admin-resource
    path: src/settings/index.jsx
permissions:
  scopes:
    - storage:app
  external:
    fetch:
      backend:
        - address: "*"
